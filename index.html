<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>🎉 Happy Birthday Gaurav Da 🎉</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="card">
    <header class="hero">
      <h1 id="birthday-name">🎂 Happy Birthday, <span class="glow-text">Gaurav Da</span>! 🎂</h1>
      <p id="subtitle">Wishing you a day full of joy, love & laughter ✨</p>
    </header>

    <section class="wishes">
      <p>"May your birthday be filled with sweet moments, laughter, and unforgettable memories!" 🎁</p>
    </section>

    <section class="controls">
      <button id="play-music"> https://www.youtube.com/watch?v=9s2q74RDWoY&list=RD9s2q74RDWoY&start_radio=1 🎶</button>
      <button id="surprise-btn">Show Surprise 🎁</button>
    </section>

    <section class="cake-section" id="cake-section">
      <img src="https://i.postimg.cc/3x3QnV0k/birthday-cake.png" alt="Birthday Cake" id="birthday-cake">
    </section>

    <footer class="footer">
      <small>Made with ❤️ for Gaurav Da</small>
    </footer>
  </main>

  <div id="confetti-wrapper"></div>

  <audio id="bg-music" loop preload="none">
    <source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_8f3f0df5f6.mp3?filename=happy-11801.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <script src="script.js"></script>
</body>
</html>
